name: CI

on:
  push:
    branches: [main, consolidation-vowos]
  pull_request:
    branches: [main, consolidation-vowos]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run API tests
        run: npm test -w apps/api

      - name: Build web (catch TypeScript errors)
        run: npm run -w apps/web build
