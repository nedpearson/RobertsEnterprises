<!-- Global Voice Assistant Modal -->
<div class="modal fade" id="voiceAssistantModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content overflow-hidden text-center"
            style="background: var(--kpi-bg, linear-gradient(145deg, #1e1e1e, #181818)); border: 1px solid var(--border-color); border-radius: 1rem; color: #fff;">
            <div class="modal-body p-4 position-relative">
                <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3"
                    data-bs-dismiss="modal" onclick="VoiceAssistant.cancel()"></button>

                <h5 class="mb-3" style="color: #aa8c66;">AI Work Assistant</h5>

                <div id="voiceListeningAnim" class="mb-4">
                    <!-- Simple CSS mic pulse -->
                    <div class="d-flex justify-content-center align-items-center" style="height: 80px;">
                        <div class="spinner-grow text-danger" role="status"
                            style="width: 3rem; height: 3rem; animation-duration: 1.5s;">
                            <span class="visually-hidden">Listening...</span>
                        </div>
                    </div>
                </div>

                <div id="voiceTranscriptPreview" class="fst-italic text-muted small mb-3"
                    style="min-height: 2em; letter-spacing: 0.5px;">
                    Listening...
                </div>

                <div id="voiceActionPlan" class="d-none text-start mb-3 p-2 rounded"
                    style="background: rgba(0,0,0,0.2); font-size: 0.85rem;">
                    <!-- Filled by JS -->
                </div>

                <div id="voiceControls">
                    <button class="btn btn-outline-danger btn-sm" onclick="VoiceAssistant.cancel()">Cancel</button>
                    <button class="btn btn-primary theme-btn btn-sm" id="voiceConfirmBtn"
                        onclick="VoiceAssistant.executePlan()" disabled>Confirm Action</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const VoiceAssistant = {
        recognition: null,
        transcript: '',
        currentActionPlan: null,

        init() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                console.warn("Speech extraction not supported in this browser fallback.");
                return;
            }
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            this.recognition = new SpeechRec();
            this.recognition.continuous = false;
            this.recognition.interimResults = true;

            this.recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscriptChunk = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscriptChunk += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                this.transcript += finalTranscriptChunk;
                document.getElementById('voiceTranscriptPreview').innerText = this.transcript + interimTranscript;
            };

            this.recognition.onend = () => {
                if (this.transcript.trim().length > 0 && !this.currentActionPlan) {
                    this.processTranscript();
                } else if (!this.currentActionPlan) {
                    this.cancel();
                }
            };
        },

        start() {
            this.transcript = '';
            this.currentActionPlan = null;
            document.getElementById('voiceTranscriptPreview').innerText = 'Listening...';
            document.getElementById('voiceListeningAnim').classList.remove('d-none');
            document.getElementById('voiceActionPlan').classList.add('d-none');
            document.getElementById('voiceConfirmBtn').disabled = true;

            new bootstrap.Modal(document.getElementById('voiceAssistantModal')).show();

            if (this.recognition) {
                try { this.recognition.start(); } catch (e) { console.error(e); }
            } else {
                alert("Voice commands are not supported on this browser.");
            }
        },

        cancel() {
            if (this.recognition) {
                this.recognition.stop();
            }
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
            const modalEl = document.getElementById('voiceAssistantModal');
            const modalInstance = bootstrap.Modal.getInstance(modalEl);
            if (modalInstance) modalInstance.hide();
        },

        processTranscript() {
            document.getElementById('voiceListeningAnim').classList.add('d-none');
            document.getElementById('voiceTranscriptPreview').innerText = "Processing: " + this.transcript;

            // Collect page context safely
            let context = {};
            const pathSegments = window.location.pathname.split('/');
            if (pathSegments.includes('customers')) {
                const id = pathSegments[pathSegments.indexOf('customers') + 1];
                if (!isNaN(parseInt(id))) { context = { type: 'customer', id: parseInt(id) }; }
            } else if (pathSegments.includes('orders')) {
                const id = pathSegments[pathSegments.indexOf('orders') + 1];
                if (!isNaN(parseInt(id))) { context = { type: 'order', id: parseInt(id) }; }
            } else if (pathSegments.includes('purchasing')) {
                // If on purchasing page, maybe looking at a PO
                // Logic can expand here based on URL structure
            }

            fetch('/api/voice/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ transcript: this.transcript, page_context: context })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        this.currentActionPlan = data.action_plan;

                        let confirmationPrompt = "I understood your request. Ready to execute?";
                        if (data.action_plan.intent === 'QUERY_DATABASE') {
                            confirmationPrompt = `Shall I look up this information?`;
                        } else if (data.action_plan.intent === 'ADD_INTERNAL_TEAM_NOTE') {
                            confirmationPrompt = `I've prepared a note. Shall I save it?`;
                        } else if (data.action_plan.intent === 'CAPTURE_MEASUREMENTS') {
                            confirmationPrompt = `I've recorded the measurements. Shall I save them?`;
                        } else if (data.action_plan.intent === 'BOOK_APPOINTMENT') {
                            confirmationPrompt = `I've prepared this appointment booking. Shall I confirm it?`;
                        } else if (data.action_plan.intent === 'RESCHEDULE_APPOINTMENT') {
                            confirmationPrompt = `I've prepared to reschedule this appointment. Shall I confirm it?`;
                        } else if (data.action_plan.intent === 'INVENTORY_LOOKUP') {
                            confirmationPrompt = `Shall I look up this inventory item?`;
                        } else if (data.action_plan.intent === 'UPDATE_ORDER_STATUS') {
                            confirmationPrompt = `I'm ready to update the order status. Shall I proceed?`;
                        } else if (data.action_plan.intent === 'TIME_CLOCK_ACTION') {
                            const action = data.action_plan.parameters.action || 'in';
                            confirmationPrompt = `I am ready to clock you ${action}. Shall I proceed?`;
                        } else if (data.action_plan.intent === 'CREATE_REMINDER') {
                            confirmationPrompt = `I've drafted your reminder. Shall I save it?`;
                        } else if (data.action_plan.intent === 'NAVIGATE_PAGE') {
                            confirmationPrompt = `I will take you there now. Shall I proceed?`;
                        } else if (data.action_plan.intent === 'DRAFT_COMMUNICATION') {
                            confirmationPrompt = `I've prepared the ${data.action_plan.parameters.communication_type || 'message'}. Shall I save it to draft logs?`;
                        } else if (data.action_plan.intent === 'CHECK_SCHEDULE') {
                            confirmationPrompt = `Shall I retrieve your schedule?`;
                        } else if (data.action_plan.intent === 'BROADCAST_MESSAGE') {
                            confirmationPrompt = `I am ready to broadcast this system-wide. Shall I send it?`;
                        } else if (data.action_plan.intent === 'CREATE_ORDER') {
                            confirmationPrompt = `I'll create an order for this now. Shall I proceed?`;
                        } else if (data.action_plan.intent === 'FETCH_KPI_DATA') {
                            confirmationPrompt = `Shall I fetch the reporting summary for ${data.action_plan.parameters.time_period || 'that period'}?`;
                        } else if (data.action_plan.intent === 'GET_PAYROLL_SUMMARY') {
                            confirmationPrompt = `Shall I check your payroll and commission data for ${data.action_plan.parameters.time_period || 'that period'}?`;
                        } else if (data.action_plan.intent === 'ADD_CUSTOMER') {
                            confirmationPrompt = `I'm ready to create a new profile for ${data.action_plan.parameters.new_customer?.first_name || 'this person'}. Shall I proceed?`;
                        } else if (data.action_plan.intent === 'LOG_PAYMENT') {
                            confirmationPrompt = `I've prepared to log a payment of $${parseFloat(data.action_plan.parameters.payment_amount).toFixed(2)}. Shall I save it?`;
                        }

                        const planHtml = `
                        <div class="alert alert-info py-2 mb-2"><strong><i class="bi bi-robot"></i> AI:</strong> "${confirmationPrompt}"</div>
                        <strong>Intent:</strong> ${data.action_plan.intent}<br>
                        <strong>Target:</strong> ${data.action_plan.target_entity_type || 'Unknown'} #${data.action_plan.resolved_target_id || '?'}<br>
                        <strong>Details:</strong> ${JSON.stringify(data.action_plan.parameters)}
                    `;
                        document.getElementById('voiceActionPlan').innerHTML = planHtml;
                        document.getElementById('voiceActionPlan').classList.remove('d-none');
                        document.getElementById('voiceConfirmBtn').disabled = false;
                        document.getElementById('voiceTranscriptPreview').innerText = "Ready to execute.";

                        this.speakText(confirmationPrompt);
                    } else {
                        document.getElementById('voiceTranscriptPreview').innerText = "AI could not understand intent: " + (data.message || '');
                        this.speakText("I'm sorry, I couldn't understand that.");
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('voiceTranscriptPreview').innerText = "Network error connecting to AI.";
                });
        },

        executePlan() {
            document.getElementById('voiceConfirmBtn').disabled = true;
            document.getElementById('voiceConfirmBtn').innerText = "Executing...";

            fetch('/api/voice/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action_plan: this.currentActionPlan })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        this.speakText(data.message);
                        if (this.currentActionPlan.intent === 'QUERY_DATABASE' || this.currentActionPlan.intent === 'INVENTORY_LOOKUP' || this.currentActionPlan.intent === 'CHECK_SCHEDULE' || this.currentActionPlan.intent === 'FETCH_KPI_DATA' || this.currentActionPlan.intent === 'GET_PAYROLL_SUMMARY') {
                            // Show the answer instead of reloading
                            document.getElementById('voiceActionPlan').innerHTML = `
                                <div class="alert alert-success py-2 mb-0"><strong><i class="bi bi-robot"></i> Answer:</strong> ${data.message}</div>
                            `;
                            document.getElementById('voiceConfirmBtn').innerText = "Done";
                        } else if (this.currentActionPlan.intent === 'BROADCAST_MESSAGE') {
                            document.getElementById('voiceActionPlan').innerHTML = `
                                <div class="alert alert-success py-2 mb-0"><strong><i class="bi bi-broadcast"></i> Sent:</strong> ${data.message}</div>
                            `;
                            document.getElementById('voiceConfirmBtn').innerText = "Done";
                        } else if (data.redirect_url) {
                            alert("Success: " + data.message);
                            setTimeout(() => { window.location.href = data.redirect_url; }, 1000); // Redirect seamlessly
                        } else {
                            alert("Success: " + data.message);
                            setTimeout(() => { window.location.reload(); }, 2000); // Refresh to show updates
                        }
                    } else {
                        this.speakText("Sorry, execution failed.");
                        alert("Execution Failed: " + data.message);
                    }
                })
                .catch(err => {
                    this.speakText("Sorry, a network error occurred.");
                    document.getElementById('voiceConfirmBtn').innerText = "Confirm Action";
                    document.getElementById('voiceConfirmBtn').disabled = false;
                });
        },

        speakText(text) {
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                // Try to find a good English voice
                const voices = window.speechSynthesis.getVoices();
                const engVoice = voices.find(v => v.lang.includes('en-') && v.name.includes('Female')) || voices.find(v => v.lang.includes('en-'));
                if (engVoice) utterance.voice = engVoice;

                window.speechSynthesis.speak(utterance);
            }
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        VoiceAssistant.init();
    });

    document.addEventListener('keydown', (e) => {
        // Exclude inputs and textareas to prevent interfering with typing
        if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;

        // Hotkey: Shift + Space
        if (e.shiftKey && e.code === 'Space') {
            e.preventDefault();
            const voiceModalEl = document.getElementById('voiceAssistantModal');
            if (!voiceModalEl.classList.contains('show')) {
                const modal = new bootstrap.Modal(voiceModalEl);
                modal.show();
                // Adding a slight timeout to ensure animation starts cleanly
                setTimeout(() => { VoiceAssistant.start(); }, 300);
            }
        }
    });
</script>
