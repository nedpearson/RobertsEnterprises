<!-- Global Drilldown Drawer / Modal Component -->
<div class="modal fade" id="globalDrilldownModal" tabindex="-1" aria-labelledby="globalDrilldownModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content ">
            <div class="modal-header border-bottom flex-column align-items-start">
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <h5 class="modal-title " id="globalDrilldownModalLabel">
                        <i class="bi bi-search me-2 theme-text"></i>
                        <span id="globalDrilldownTitle">Analyzing Data...</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div id="globalDrilldownBreadcrumbs" class="w-100 mt-2 small text-muted d-none"
                    style="font-size: 0.85rem;">
                    <!-- Breadcrumbs injected here -->
                </div>
            </div>
            <div class="modal-body p-0">
                <!-- Loading State inside Modal -->
                <div id="globalDrilldownLoader" class="text-center py-5">
                    <div class="spinner-border theme-text" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 text-muted">Retrieving data...</p>
                </div>

                <!-- Data Table State -->
                <div class="table-responsive d-none" id="globalDrilldownTableContainer">
                    <table class="table table-hover mb-0 align-middle" id="globalDrilldownTable">
                        <thead id="globalDrilldownTableHead">
                            <!-- Dynamic Columns -->
                        </thead>
                        <tbody id="globalDrilldownTableBody">
                            <!-- Dynamic Rows -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer border-top ">
                <span class="text-muted small me-auto" id="globalDrilldownRecordCount"></span>
                <button type="button" class="btn btn-sm btn-outline-light" onclick="exportGlobalDrilldownCSV()">
                    <i class="bi bi-filetype-csv me-1"></i> Export to CSV
                </button>
                <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
