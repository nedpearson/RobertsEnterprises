<!-- New Appointment Modal -->
<div class="modal fade" id="newAppointmentModal" tabindex="-1" aria-labelledby="newAppointmentModalLabel"
    aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header border-bottom">
                <h5 class="modal-title" id="newAppointmentModalLabel">Book New Appointment</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <form action="{{ url_for('appointments.book_appointment') }}" method="POST">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label theme-text small text-muted text-uppercase fw-bold">Select Customer
                                <span class="text-danger">*</span></label>
                            <select class="form-select" name="customer_id" required>
                                <option value="">-- Choose Customer --</option>
                                {% for c in customers %}
                                <option value="{{ c.id }}">{{ c.first_name }} {{ c.last_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label theme-text small text-muted text-uppercase fw-bold">Service Type
                                <span class="text-danger">*</span></label>
                            <select class="form-select" name="service_id" required>
                                <option value="">-- Choose Service --</option>
                                {% for s in services_list %}
                                <option value="{{ s.id }}">{{ s.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label theme-text small text-muted text-uppercase fw-bold">Start Time
                                <span class="text-danger">*</span></label>
                            <input type="datetime-local" class="form-control" name="start_at" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label theme-text small text-muted text-uppercase fw-bold">End Time <span
                                    class="text-danger">*</span></label>
                            <input type="datetime-local" class="form-control" name="end_at" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label theme-text small text-muted text-uppercase fw-bold">Assigned
                                Stylist (Optional)</label>
                            <select class="form-select" name="assigned_staff_id">
                                <option value="">-- Unassigned --</option>
                                {% for u in staff_list %}
                                <option value="{{ u.id }}">{{ u.first_name }} {{ u.last_name }} ({{ u.role }})</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top">
                    <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-sm btn-primary">Book Appointment</button>
                </div>
            </form>
        </div>
    </div>
</div>
