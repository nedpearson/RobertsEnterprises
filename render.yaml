services:
  - type: web
    name: roberts-api
    runtime: node
    rootDir: apps/api
    plan: starter
    buildCommand: "npm install"
    preDeployCommand: "npm run migrate"
    startCommand: "node server.js"
    healthCheckPath: /api/health
    domains:
      - api.robertsenterprises.bridgebox.ai
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: roberts-db, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://robertsenterprises.bridgebox.ai
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

  - type: web
    name: roberts-web
    runtime: static
    rootDir: apps/web
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    domains:
      - robertsenterprises.bridgebox.ai
    envVars:
      - key: VITE_API_URL
        value: https://api.robertsenterprises.bridgebox.ai
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: roberts-db
    plan: basic-256mb
    databaseName: vowos
